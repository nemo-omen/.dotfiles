import:
  - ~/.config/alacritty/blackbird.yml

font:
  bold:
    family: Fira Code NF
  italic:
    family: Fira Code NF
  normal:
    family: Fira Code NF
    style: Regular
  size: 12
  offset:
    y: 0
    x: 1

window:
  opacity: 0.7

  padding:
    x: 10
    y: 10
  
  dynamic_padding: true
  
cursor:
  style:
    shape: Beam